services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infralens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infralens}
      POSTGRES_DB: ${POSTGRES_DB:-infralens}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infralens} -d ${POSTGRES_DB:-infralens}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-infralens}:${POSTGRES_PASSWORD:-infralens}@postgres:5432/${POSTGRES_DB:-infralens}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_REASONING_MODEL: ${OLLAMA_REASONING_MODEL:-qwen3:1.7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      INGEST_KEY: ${INGEST_KEY:-change-me-local}
      SEED_DATA_DIR: /workspace/seed_data/procurement
      PROMPTS_DIR: /workspace/prompts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./prompts:/workspace/prompts:ro
      - ./seed_data:/workspace/seed_data:ro
      - ./eval_cases:/workspace/eval_cases:ro

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "infralens"]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-infralens}:${POSTGRES_PASSWORD:-infralens}@postgres:5432/${POSTGRES_DB:-infralens}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_REASONING_MODEL: ${OLLAMA_REASONING_MODEL:-qwen3:1.7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      INGEST_KEY: ${INGEST_KEY:-change-me-local}
      SEED_DATA_DIR: /workspace/seed_data/procurement
      PROMPTS_DIR: /workspace/prompts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./prompts:/workspace/prompts:ro
      - ./seed_data:/workspace/seed_data:ro
      - ./eval_cases:/workspace/eval_cases:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
